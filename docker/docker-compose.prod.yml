# Production override. Layer on top of the base compose:
#   docker compose -f docker/docker-compose.yml -f docker/docker-compose.prod.yml up -d
#
# In production the app's fail-closed config REQUIRES strong COOKIE_SECRET /
# SESSION_SECRET, a non-wildcard CORS_ALLOWED_ORIGINS, an APP_BASE_URL, and a
# TLS-enforced DATABASE_URL (sslmode=require) — the container will refuse to
# start otherwise. Terminate TLS at a reverse proxy in front of the app; do not
# expose the app directly. Prefer a managed/TLS Postgres over the bundled one.

services:
  app:
    environment:
      APP_ENV: production
      SECURE_COOKIES: 'true'
      APP_BASE_URL: ${APP_BASE_URL:?set APP_BASE_URL in production}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set explicit origins (no wildcard)}
      DATABASE_URL: postgres://capybara_app:${DB_APP_PASSWORD:?}@db:5432/${POSTGRES_DB:-capybara}?sslmode=require
    # Publish only to the reverse-proxy network in real deployments. By default
    # we keep it loopback-bound; override `ports` for your proxy topology.
    ports:
      - '127.0.0.1:${APP_PORT:-3000}:3000'
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: always

  migrate:
    environment:
      DATABASE_MIGRATION_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-capybara}?sslmode=require
