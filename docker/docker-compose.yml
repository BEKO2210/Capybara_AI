# Local development stack: PostgreSQL + Capybara_AI.
#
# Secure-by-default:
#   - No credentials are baked in. Required secrets use the ${VAR:?} form, so
#     `docker compose up` FAILS CLOSED if they are not provided (via a .env file
#     in this directory or the shell environment).
#   - The app's host port is bound to LOOPBACK only (127.0.0.1).
#   - Postgres is NOT published to the host; it is reachable only on the
#     internal compose network.
#   - The app connects as the restricted `capybara_app` role; the one-shot
#     `migrate` service uses the privileged role to create tables/RLS.
#
# Quickstart:
#   cp ../.env.example .env   # then fill in strong values (see below)
#   Required in .env: POSTGRES_PASSWORD, DB_APP_PASSWORD, COOKIE_SECRET,
#                     SESSION_SECRET
#   docker compose -f docker/docker-compose.yml up --build

x-app-image: &app-image
  build:
    context: ..
    dockerfile: docker/Dockerfile

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-capybara}
    volumes:
      - capy-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-capybara}']
      interval: 5s
      timeout: 5s
      retries: 12
    security_opt:
      - no-new-privileges:true
    # Not published to the host on purpose.

  # One-shot: creates the restricted app role + applies migrations (privileged).
  migrate:
    <<: *app-image
    command: ['node', 'dist/db/migrate-cli.js']
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_MIGRATION_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?}@db:5432/${POSTGRES_DB:-capybara}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD:?set DB_APP_PASSWORD in .env}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: 'no'

  app:
    <<: *app-image
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      APP_ENV: ${APP_ENV:-development}
      # Bind to all interfaces INSIDE the container; the host publish below
      # restricts exposure to loopback.
      APP_BIND: 0.0.0.0
      APP_PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      DATABASE_URL: postgres://capybara_app:${DB_APP_PASSWORD:?}@db:5432/${POSTGRES_DB:-capybara}
      COOKIE_SECRET: ${COOKIE_SECRET:?set COOKIE_SECRET in .env}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    user: '${PUID:-10001}:${PGID:-10001}'
    ports:
      - '127.0.0.1:${APP_PORT:-3000}:3000'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    restart: unless-stopped

  # On-demand backup (db dump + retention). Opt-in via the `backup` profile so it
  # never runs as part of a normal `up`. Mirrors scripts/backup.sh but uses the
  # postgres image (which ships pg_dump). Schedule it from the host cron / a
  # sidecar scheduler — see docs/DISASTER_RECOVERY.md.
  #   docker compose -f docker/docker-compose.yml --profile backup run --rm backup
  backup:
    image: postgres:16-alpine
    profiles: ['backup']
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - capy-backups:/backups
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    entrypoint: ['/bin/sh', '-ec']
    command:
      - |
        ts="$$(date -u +%Y%m%d-%H%M%S)"
        out="/backups/capybara-db-$$ts.sql.gz"
        echo "dumping database -> $$out"
        pg_dump --no-owner --no-privileges -h db -U "${POSTGRES_USER:-postgres}" -d "${POSTGRES_DB:-capybara}" | gzip -9 > "$$out"
        chmod 600 "$$out"
        echo "pruning backups older than $${BACKUP_RETENTION_DAYS} days"
        find /backups -maxdepth 1 -type f -name 'capybara-db-*' -mtime "+$${BACKUP_RETENTION_DAYS}" -print -delete || true
        echo "backup complete"
    restart: 'no'

volumes:
  capy-db-data:
  capy-backups:
